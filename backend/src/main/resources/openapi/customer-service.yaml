openapi: 3.0.3
info:
  title: Customer Service API
  version: 1.0.0
  description: API spec for customer-service backend

servers:
  - url: http://localhost:8080

paths:
  /api/health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Health check endpoint
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/customers:
    get:
      tags:
        - Customer
      operationId: listCustomers
      summary: List all customers
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      tags:
        - Customer
      operationId: createCustomer
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /api/customers/{id}:
    get:
      tags:
        - Customer
      operationId: getCustomerById
      summary: Get customer by id
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    put:
      tags:
        - Customer
      operationId: updateCustomer
      summary: Update customer
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      tags:
        - Customer
      operationId: deleteCustomer
      summary: Delete customer
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  parameters:
    CustomerId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: UP
        service:
          type: string
          example: customer-service-backend

    Customer:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email

    CreateCustomerRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email

    UpdateCustomerRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
        email:
          type: string
          format: email
